<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أداة اقتصاص احترافية</title>

<script>
  if (localStorage.getItem("site_theme") === "dark") {
    document.documentElement.classList.add("dark-mode");
    document.addEventListener("DOMContentLoaded", () => document.body.classList.add("dark-mode"));
  }
</script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">

<style>
:root {
    --purple: #8b5cf6;
    --green: #10b981;
    --bg: #f8fafc;
    --card: #fff;
    --text: #111;
    --desc: #64748b;
    --border: #d1d5db;
}

/* تعديلات الوضع الليلي */
.dark-mode {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --desc: #94a3b8;
    --border: #334155;
}

body {
    margin: 0;
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    padding: 18px;
    color: var(--text);
    transition: background 0.3s ease;
}

.container {
    width: 100%;
    max-width: 850px;
}

.back {
    display: inline-block;
    margin-bottom: 12px;
    padding: 8px 14px;
    background: var(--card);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    box-shadow: 0 3px 10px rgba(0,0,0,0.05);
    border: 1px solid var(--border);
}

.card {
    background: var(--card);
    border-radius: 22px;
    padding: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
}

h1 {
    margin: 0;
    color: var(--purple);
    font-size: 20px;
}

p {
    margin: 5px 0 15px;
    color: var(--desc);
    font-size: 13px;
}

/* رفع الصورة */
.upload {
    position: relative;
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 22px;
    text-align: center;
    cursor: pointer;
    background: var(--card);
    margin-bottom: 15px;
    color: var(--text);
}

.upload input {
    position: absolute;
    inset: 0;
    opacity: 0;
}

.crop-area {
    width: 100%;
    height: 420px;
    background: #111;
    border-radius: 16px;
    overflow: hidden;
    display: none;
    align-items: center;
    justify-content: center;
}

.crop-area img {
    max-width: 100%;
    max-height: 100%;
    display: block;
}

/* شريط القوالب */
.presets {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 10px 0;
    margin-top: 10px;
    scroll-snap-type: x mandatory;
}

.presets::-webkit-scrollbar { height: 6px; }
.presets::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

.preset {
    flex: 0 0 auto;
    padding: 8px 12px;
    border: none;
    border-radius: 10px;
    font-size: 12px;
    cursor: pointer;
    background: #111827;
    color: white;
    white-space: nowrap;
    scroll-snap-align: start;
}

.preset.purple { background: var(--purple); }
.preset.green { background: var(--green); }

.crop-btn {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 14px;
    background: var(--purple);
    color: white;
    font-weight: 700;
    cursor: pointer;
    display: none;
}

.result img {
    width: 100%;
    margin-top: 15px;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">
<a class="back" href="index.html">← رجوع</a>

<div class="card">
    <h1>قص الصور احترافي</h1>
    <p>اختار صورة ثم حدد المقاس أو قص حر</p>

    <div style="width: 100%; max-width: 900px; margin: 15px auto; text-align: center;">
        <p style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px;">إعلان</p>
        <script async="async" data-cfasync="false" src="https://pl29170484.profitablecpmratenetwork.com/545e1c9e9b7c0e88a4d7e2c73a81da5f/invoke.js"></script>
        <div id="container-545e1c9e9b7c0e88a4d7e2c73a81da5f"></div>
    </div>

    <div class="upload">
        📁 اضغط لرفع الصورة
        <input type="file" id="input" accept="image/*">
    </div>

    <div class="crop-area">
        <img id="img">
    </div>

    <div class="presets">
        <button class="preset" onclick="setRatio(1/1)">1:1</button>
        <button class="preset" onclick="setRatio(4/5)">إنستا 4:5</button>
        <button class="preset" onclick="setRatio(9/16)">تيك توك 9:16</button>
        <button class="preset" onclick="setRatio(16/9)">يوتيوب 16:9</button>
        <button class="preset" onclick="setRatio(3/4)">3:4</button>
        <button class="preset" onclick="setRatio(2/3)">2:3</button>
        <button class="preset purple" onclick="setRatio(NaN)">حر</button>
        <button class="preset green" onclick="resetCrop()">إعادة</button>
    </div>

    <button class="crop-btn" id="cropBtn">قص الصورة</button>

    <div class="result" id="result"></div>
</div>
</div>

<script src="translate.js" defer></script>
<script src="translations-complete.js" defer></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
let cropper;
const input = document.getElementById("input");
const img = document.getElementById("img");
const box = document.querySelector(".crop-area");
const btn = document.getElementById("cropBtn");

input.onchange = function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
        img.src = ev.target.result;
        box.style.display = "flex";
        btn.style.display = "block";
        if(cropper) cropper.destroy();
        cropper = new Cropper(img,{
            viewMode:1,
            dragMode:"move",
            autoCropArea:0.9,
            guides:true,
            center:true,
            cropBoxResizable:true,
            cropBoxMovable:true,
            aspectRatio:NaN
        });
    };
    reader.readAsDataURL(file);
};

function setRatio(r){ if(cropper) cropper.setAspectRatio(r); }
function resetCrop(){ if(cropper){ cropper.setAspectRatio(NaN); cropper.reset(); } }

btn.onclick = function(){
    const canvas = cropper.getCroppedCanvas({ maxWidth:4096, maxHeight:4096 });
    canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        document.getElementById("result").innerHTML = `
            <img src="${url}">
            <br>
            <a href="${url}" download="crop.png"
            style="display:inline-block;margin-top:10px;
            background:#10b981;color:white;padding:10px 16px;
            border-radius:10px;text-decoration:none;font-weight:bold;">
            تحميل الصورة
            </a>
        `;
    });
};
</script>

<script src="https://pl29170221.profitablecpmratenetwork.com/ea/5d/50/ea5d507ec11c217dd8d0b5f3a6553584.js"></script>
</body>
</html>
